<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4A90D9" />
  <title>认知训练游戏平台</title>
  <style>
    /* ── Design Tokens ─────────────────────────── */
    :root {
      --primary:   #4A90D9;
      --primary-d: #357ABD;
      --bg:        #EEF2F7;
      --card:      #FFFFFF;
      --text:      #2D3748;
      --muted:     #718096;
      --success:   #38A169;
      --warn:      #E67E22;
      --radius:    14px;
      --shadow:    0 4px 18px rgba(0,0,0,0.09);
    }

    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Update Banner ─────────────────────────── */
    #update-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--warn);
      color: #fff;
      padding: 10px 20px;
      font-size: 0.95rem;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    #update-banner.visible { display: flex; }
    #update-banner button {
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      border-radius: 6px;
      padding: 4px 14px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    #update-banner button:hover { background: rgba(255,255,255,0.4); }

    /* ── Header ────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, #6DB3E8 100%);
      color: #fff;
      padding: 22px 28px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(74,144,217,0.35);
    }
    .header-left h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; }
    .header-left p  { font-size: 0.88rem; opacity: 0.85; margin-top: 3px; }

    .header-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      font-size: 0.82rem;
      opacity: 0.9;
    }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6EF26E;
      margin-right: 5px;
    }
    .status-dot.offline { background: #FF6B6B; }

    /* ── Section title ─────────────────────────── */
    .section-title {
      padding: 24px 28px 4px;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* ── Game Grid ─────────────────────────────── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 16px 28px 40px;
    }

    /* ── Game Card ─────────────────────────────── */
    .game-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      overflow: hidden;
      position: relative;
    }
    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.14);
    }
    .game-card:active { transform: translateY(-1px); }

    /* Color accent strip at top */
    .card-strip {
      height: 5px;
      background: var(--accent, var(--primary));
    }

    .card-body {
      padding: 20px 20px 16px;
    }
    .card-icon {
      font-size: 2.6rem;
      line-height: 1;
      margin-bottom: 12px;
    }
    .card-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px 14px;
      border-top: 1px solid #F0F0F0;
    }
    .card-author { font-size: 0.78rem; color: var(--muted); }

    .cache-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: #EDF2FF;
      color: #4C6EF5;
      display: none;
    }
    .cache-badge.visible { display: inline-block; }

    .play-btn {
      background: var(--accent, var(--primary));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .play-btn:hover { opacity: 0.88; }

    /* ── Tags ──────────────────────────────────── */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 20px 12px;
    }
    .tag {
      font-size: 0.72rem;
      padding: 2px 9px;
      border-radius: 20px;
      background: #F7F9FC;
      color: var(--muted);
      border: 1px solid #E2E8F0;
    }

    /* ── Game Overlay ──────────────────────────── */
    #game-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #1A202C;
      flex-direction: column;
    }
    #game-overlay.visible { display: flex; }

    .overlay-bar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 52px;
      background: #2D3748;
      flex-shrink: 0;
      gap: 12px;
    }
    .overlay-title {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      flex: 1;
    }
    .overlay-score {
      color: #A0AEC0;
      font-size: 0.88rem;
    }
    #close-btn {
      background: #4A5568;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #close-btn:hover { background: #E53E3E; }
    #prefetch-btn {
      background: #4C6EF5;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    #prefetch-btn:disabled { opacity: 0.5; cursor: default; }

    #game-iframe {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }

    /* ── Loading Spinner ───────────────────────── */
    #loader {
      display: none;
      position: absolute;
      inset: 52px 0 0 0;
      background: #1A202C;
      align-items: center;
      justify-content: center;
      z-index: 310;
    }
    #loader.visible { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ─────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2D3748;
      color: #fff;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 400;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 600px) {
      .game-grid { padding: 12px 14px 32px; gap: 14px; }
      .header { padding: 16px 16px 14px; }
      .header-meta { display: none; }
    }
  </style>
</head>
<body>

  <!-- Update notification -->
  <div id="update-banner">
    <span>🔄 发现新版本，建议更新以获取最新游戏内容</span>
    <button id="update-btn">立即更新</button>
    <button id="dismiss-btn">稍后</button>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1>🧩 认知训练游戏</h1>
      <p>阿尔茨海默症认知功能训练平台</p>
    </div>
    <div class="header-meta">
      <div>
        <span class="status-dot" id="status-dot"></span>
        <span id="online-label">检测中…</span>
      </div>
      <div id="version-label" style="opacity:0.75">版本 —</div>
      <div id="update-time" style="opacity:0.65">—</div>
    </div>
  </header>

  <p class="section-title">请选择要开始的训练项目</p>

  <!-- Game grid (populated by JS) -->
  <div id="game-grid" class="game-grid"></div>

  <!-- Game Overlay -->
  <div id="game-overlay">
    <div class="overlay-bar">
      <span class="overlay-title" id="overlay-title">游戏</span>
      <span class="overlay-score" id="overlay-score"></span>
      <button id="prefetch-btn" title="缓存至本地，支持离线游玩">⬇ 缓存</button>
      <button id="close-btn">✕ 关闭</button>
    </div>
    <div id="loader"><div class="spinner"></div></div>
    <iframe id="game-iframe" title="游戏窗口" allow="autoplay"></iframe>
  </div>

  <!-- Toast message -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
